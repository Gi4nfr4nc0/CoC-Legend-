<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clash Logs Viewer - Legends API</title>
<style>
body { margin: 0; font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; }
.container { max-width: 900px; margin: auto; padding: 20px; }
.profile { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 14px 15px; min-height: 70px; border-radius: 15px; margin-bottom: 20px; }
.profile h2 { margin: 0; font-size: 22px; }
.profile p { margin: 2px 0 0; font-size: 15px; opacity: 0.7; }
.trophies { font-size: 20px; font-weight: bold; }
.controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
select, input, button { padding: 10px; border-radius: 10px; border: none; background: #1e293b; color: white; font-size: 14px; }
input { flex: 2; min-width: 150px; }
button { background: #3b82f6; cursor: pointer; transition: 0.2s; }
button:hover { background: #2563eb; }
.card { background: #1e293b; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.attack { border-left: 5px solid #22c55e; }
.defense { border-left: 5px solid #ef4444; }
.big-win { box-shadow: 0 0 10px rgba(34,197,94,0.6); }
.stats { display: flex; gap: 10px; margin-bottom: 20px; }
.stat { flex: 1; background: #1e293b; padding: 10px; border-radius: 10px; text-align: center; }
.pos { color: #22c55e; }
.neg { color: #ef4444; }
.day-title { font-size: 14px; opacity: 0.7; margin-bottom: 5px; }
.footer {  position: fixed;  bottom: 0;  left: 0;  width: 100%;  text-align: center;  padding: 10px;  background: #0f172a;  font-size: 13px;  opacity: 0.7;}
.loader { text-align: center; padding: 40px; font-size: 18px; color: #94a3b8; }
.error { background: #7f1d1d; color: #fecaca; padding: 12px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
.empty { text-align: center; padding: 40px; color: #94a3b8; }
</style>
</head>
<body>
<div class="container">
<div class="profile">
  <div><h2 id="playerName">—</h2><p id="playerTag">—</p></div>
  <div class="trophies">🏆 <span id="playerTrophies">—</span></div>
</div>
<div class="controls">
  <input type="text" id="playerTagInput" placeholder="Scrivi il tuo tag Es. #8PLQ98R" value="">
  <button id="loadBtn">🔍 Carica</button>
  <select id="dateFilter"><option value="today">Oggi</option><option value="month">Mese</option></select>
  <select id="typeFilter"><option value="all">Tutti</option><option value="attack">Attacchi</option><option value="defense">Difese</option></select>
</div>
<div class="stats">
  <div class="stat">Attacchi: <span id="attackCount">0</span></div>
  <div class="stat">Difese: <span id="defenseCount">0</span></div>
  <div class="stat">Trofei: <span id="trophyDiff">0</span></div>
</div>
<div id="logsContainer"><div class="empty">Inserisci tag e premi Carica</div></div>
<div class="footer">Creato da <strong>ᴹᴬᴰᴄʜɪᴇꜰ_ɢɪᴀɴ⌂</strong>
</div>
</div>

<script>
let currentData = null;
const playerNameEl = document.getElementById("playerName");
const playerTagEl = document.getElementById("playerTag");
const playerTrophiesEl = document.getElementById("playerTrophies");
const logsContainer = document.getElementById("logsContainer");
const attackCountSpan = document.getElementById("attackCount");
const defenseCountSpan = document.getElementById("defenseCount");
const trophyDiffSpan = document.getElementById("trophyDiff");
const loadBtn = document.getElementById("loadBtn");
const playerTagInput = document.getElementById("playerTagInput");
const dateFilter = document.getElementById("dateFilter");
const typeFilter = document.getElementById("typeFilter");

function cleanTag(tag) {
  let cleaned = tag.trim();
  if (!cleaned.startsWith("#")) cleaned = "#" + cleaned;
  return encodeURIComponent(cleaned);
}

function showLoading() {
  logsContainer.innerHTML = '<div class="loader">⏳ Caricamento...</div>';
  attackCountSpan.innerText = "0"; defenseCountSpan.innerText = "0"; trophyDiffSpan.innerText = "0";
}
function showError(message) {
  logsContainer.innerHTML = `<div class="error">❌ ${message}</div>`;
  playerNameEl.innerText = "—"; playerTagEl.innerText = "—"; playerTrophiesEl.innerText = "—";
  attackCountSpan.innerText = "0"; defenseCountSpan.innerText = "0"; trophyDiffSpan.innerText = "0";
  currentData = null;
}

function getClashDay(ts) {
  const d = new Date(ts);
  if (d.getHours() < 6) d.setDate(d.getDate() - 1);
  d.setHours(0,0,0,0);
  return d;
}
function isToday(ts) {
  return getClashDay(ts).getTime() === getClashDay(Date.now()).getTime();
}

function render() {
  if (!currentData || !currentData.logs) {
    logsContainer.innerHTML = '<div class="empty">Nessun dato. Carica un tag.</div>';
    return;
  }
  const dateFilterValue = dateFilter.value;
  const typeFilterValue = typeFilter.value;
  let logs = [...currentData.logs];
  logsContainer.innerHTML = "";
  let attackCount = 0, defenseCount = 0, trophyDiff = 0;

  if (dateFilterValue === "today") {
    logs = logs.filter(l => isToday(l.timestamp));
    if (typeFilterValue !== "all") logs = logs.filter(l => l.type === typeFilterValue);
    logs.sort((a,b)=>b.timestamp-a.timestamp).forEach(log => {
      if (log.type === "attack") attackCount++;
      if (log.type === "defense") defenseCount++;
      trophyDiff += log.diff || 0;
      const icon = log.type === "attack" ? "⚔️" : "🛡️";
      const diffClass = (log.diff||0) >= 0 ? "pos" : "neg";
      const bigWin = (log.diff||0) >= 100 ? "big-win" : "";
      const div = document.createElement("div");
      div.className = `card ${log.type} ${bigWin}`;
      div.innerHTML = `<div>${icon} <strong>${log.type === "attack" ? "ATTACCO" : "DIFESA"}</strong><br>${new Date(log.timestamp).toLocaleString('it-IT')}</div>
        <div>${log.start||''} → ${log.end||''}<br><strong class="${diffClass}">${(log.diff||0)>0?"+":""}${log.diff||0}</strong></div>`;
      logsContainer.appendChild(div);
    });
    if (logs.length === 0) logsContainer.innerHTML = '<div class="empty">Nessuna battaglia oggi.</div>';
  } else {
    if (typeFilterValue !== "all") logs = logs.filter(l => l.type === typeFilterValue);
    logs.sort((a,b)=>a.timestamp-b.timestamp);
    let currentDay = null, dayLogs = [], dayIndex = 1;
    logs.forEach(log => {
      const day = getClashDay(log.timestamp);
      if (!currentDay || day.getTime() !== currentDay.getTime()) {
        if (dayLogs.length > 0) renderDay(dayIndex, dayLogs);
        dayIndex++;
        currentDay = day;
        dayLogs = [];
      }
      dayLogs.push(log);
    });
    if (dayLogs.length > 0) renderDay(dayIndex, dayLogs);
    if (logs.length === 0) logsContainer.innerHTML = '<div class="empty">Nessuna battaglia nel mese.</div>';
    function renderDay(index, dayLogs) {
      let atk=0, def=0;
      dayLogs.forEach(l => { const diff = l.diff||0; if(l.type==="attack") atk+=diff; else def+=diff; trophyDiff+=diff; attackCount+= (l.type==="attack"?1:0); defenseCount+= (l.type==="defense"?1:0); });
      const total = atk+def;
      const init = dayLogs[0].start||'', final = dayLogs[dayLogs.length-1].end||'';
      const div = document.createElement("div");
      div.innerHTML = `<div class="day-title">Giornata ${index}</div><div class="card"><div>⚔️ <strong>${atk>0?"+":""}${atk}</strong> &nbsp;&nbsp; 🛡️ <strong>${def}</strong></div><div>${init} → ${final}<br><strong class="${total>=0?"pos":"neg"}">${total>0?"+":""}${total}</strong></div></div>`;
      logsContainer.appendChild(div);
    }
  }
  attackCountSpan.innerText = attackCount;
  defenseCountSpan.innerText = defenseCount;
  trophyDiffSpan.innerText = trophyDiff;
}

async function loadPlayerData() {
  const rawTag = playerTagInput.value;
  const tagEncoded = cleanTag(rawTag);
  if (!tagEncoded) { showError("Tag non valido"); return; }

  showLoading();

  // Usa un proxy CORS pubblico (corsproxy.io) per evitare blocchi
  const targetUrl = `https://legends-api.clashperk.com/${tagEncoded}`;
  const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;
  
  // Prova prima con proxy, se fallisce prova diretto (per debug)
  let response;
  let errorMsg = "";
  try {
    console.log("Tentativo con proxy:", proxyUrl);
    response = await fetch(proxyUrl);
    if (!response.ok) throw new Error(`Proxy risponde con status ${response.status}`);
    const data = await response.json();
    if (!data || !data.logs) throw new Error("Formato dati non valido");
    currentData = data;
    playerNameEl.innerText = data.name || "Sconosciuto";
    playerTagEl.innerText = data.tag || rawTag;
    playerTrophiesEl.innerText = data.trophies ?? "—";
    render();
    return;
  } catch (e) {
    console.warn("Proxy fallito:", e);
    errorMsg = e.message;
  }

  // Fallback: chiamata diretta (potrebbe fallire per CORS, ma almeno vediamo l'errore)
  try {
    console.log("Tentativo diretto:", targetUrl);
    response = await fetch(targetUrl);
    if (!response.ok) throw new Error(`API risponde con status ${response.status}`);
    const data = await response.json();
    if (!data || !data.logs) throw new Error("Formato dati non valido");
    currentData = data;
    playerNameEl.innerText = data.name || "Sconosciuto";
    playerTagEl.innerText = data.tag || rawTag;
    playerTrophiesEl.innerText = data.trophies ?? "—";
    render();
  } catch (e) {
    console.error("Entrambi i tentativi falliti:", e);
    showError(`Errore: ${e.message}. Verifica console.`);
  }
}

loadBtn.addEventListener("click", loadPlayerData);
dateFilter.addEventListener("change", () => currentData && render());
typeFilter.addEventListener("change", () => currentData && render());
playerTagInput.addEventListener("keypress", (e) => e.key === "Enter" && loadPlayerData());
window.addEventListener("load", () => loadPlayerData()); // carica il tag di default
</script>
</body>
</html>
